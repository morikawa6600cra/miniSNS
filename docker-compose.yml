version: '3.8'

services:
  app:
    build: ./docker/php
    volumes:
      - ./src:/var/www
    working_dir: /var/www
    depends_on:
      - db

  web:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: mini_sns
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"